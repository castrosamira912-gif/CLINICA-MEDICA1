<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Clínica Médica</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body{

            background:#f4f6f9;
        }

        .navbar{

            background:#0d6efd;
        }

        .navbar-brand{

            color:white !important;

            font-weight:bold;
        }

        .nav-link{

            color:white !important;
        }

        .page-card{

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0 5px 15px rgba(0,0,0,0.1);

            margin-top:30px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand"
        href="/">

            Clínica Médica

        </a>

        <div class="navbar-nav">

            <a class="nav-link"
            href="/">

                Inicio

            </a>

            <a class="nav-link"
            href="/medicos">

                Médicos

            </a>

            <a class="nav-link"
            href="/pacientes">

                Pacientes

            </a>

            <a class="nav-link"
            href="/consultas">

                Consultas

            </a>

            <a class="nav-link"
            href="/citas">

                Agenda Citas

            </a>

            <a class="nav-link"
            href="/exportar_consultas">

                Exportar

            </a>

            <a class="nav-link"
            href="/logout">

                Cerrar Sesión

            </a>

        </div>

    </div>

</nav>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

</body>

</html>
