<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111,#1f1f1f);
    font-family:'Segoe UI',sans-serif;
}

.registro-box{
    width:430px;
    background:white;
    padding:45px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    animation:fadeIn 0.7s ease;
}

.logo{
    font-size:55px;
    text-align:center;
    margin-bottom:15px;
}

h2{
    text-align:center;
    font-weight:800;
    margin-bottom:30px;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.form-control:focus{
    border-color:#ff7a00;
    box-shadow:0 0 10px rgba(255,122,0,0.3);
}

.btn-registro{
    width:100%;
    background:#ff7a00;
    border:none;
    color:white;
    border-radius:12px;
    padding:12px;
    font-weight:700;
    transition:0.3s;
}

.btn-registro:hover{
    background:#ff8f1f;
    transform:translateY(-2px);
}

.text-link{
    text-align:center;
    margin-top:18px;
}

.text-link a{
    color:#ff7a00;
    text-decoration:none;
    font-weight:600;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="registro-box">

    <div class="logo">
        🏥
    </div>

    <h2>Crear Cuenta</h2>

    <form method="POST">

        <div class="mb-3">

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Usuario"
                required
            >

        </div>

        <div class="mb-4">

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Contraseña"
                required
            >

        </div>

        <button class="btn-registro">
            Registrarse
        </button>

    </form>

    <div class="text-link">

        ¿Ya tienes cuenta?

        <a href="/login">
            Iniciar sesión
        </a>

    </div>

</div>

</body>
</html>
