<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Citas - Clínica Médica</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

.navbar{
    background:#0f0f10 !important;
    padding:14px 20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.card{
    border:none;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    animation:fadeIn 0.5s ease;
}

.btn{
    border-radius:10px;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.btn-warning{
    background:#ff7a00;
    border:none;
    color:#fff;
}

.btn-warning:hover{
    background:#ff8f1f;
}

.table{
    border-radius:15px;
    overflow:hidden;
}

thead{
    background:#111;
    color:white;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<nav class="navbar navbar-dark">
    <a class="navbar-brand text-white fw-bold" href="/">
        Clínica Médica
    </a>

    <div class="ms-auto">
        <a href="/" class="btn btn-outline-light btn-sm">Inicio</a>
        <a href="/logout" class="btn btn-warning btn-sm">
            Cerrar Sesión
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Citas Médicas</h2>

        <a href="/crear_cita" class="btn btn-warning">
            Nueva Cita
        </a>

    </div>

    <div class="card p-4">

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Motivo</th>
                    <th>Médico</th>
                    <th>Paciente</th>
                </tr>
            </thead>

            <tbody>

            {% for cita in citas %}

                <tr>
                    <td>{{ cita.fecha }}</td>
                    <td>{{ cita.hora }}</td>
                    <td>{{ cita.motivo }}</td>
                    <td>{{ cita.medico.nombre }}</td>
                    <td>{{ cita.paciente.nombre }}</td>
                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
